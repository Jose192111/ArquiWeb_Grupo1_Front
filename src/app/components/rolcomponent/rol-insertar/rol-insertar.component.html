<div class="kh-breadcrumb">App / <a routerLink="/roles/listas">Roles</a> / <span>Nuevo</span></div>

<div class="kh-page-head">
  <div>
    <h2>Nuevo Rol</h2>
    <p>Crea un nuevo rol para el sistema</p>
  </div>
</div>

<form [formGroup]="form" (ngSubmit)="aceptar()">
  <div class="kh-form-card">
    <div class="kh-form-grid">
      <div class="kh-form-field full">
        <label>Nombre del rol <span class="req">*</span></label>
        <input class="kh-input" formControlName="nombre" placeholder="Ej. Administrador" />
      </div>
    </div>

    <div class="kh-form-actions">
      <button type="button" class="kh-btn-cancel" routerLink="/roles/listas">
        Cancelar
      </button>
      <button type="submit" class="kh-btn-save" [disabled]="form.invalid">
        Guardar rol
      </button>
    </div>
  </div>
</form>

<div class="kh-breadcrumb">App / <a routerLink="/ejercicios/listas">Ejercicios</a> / <span>Nuevo</span></div>

<div class="kh-page-head">
  <div>
    <h2>Nuevo Ejercicio</h2>
    <p>Completa los datos para registrar un ejercicio en el catálogo</p>
  </div>
</div>

@if (error) {
  <div class="kh-alert-err">⚠️ {{ error }}</div>
}

<form [formGroup]="form" (ngSubmit)="aceptar()">
  <div class="kh-form-card">
    <div class="kh-form-grid">

      <div class="kh-form-field full">
        <label>Nombre del ejercicio <span class="req">*</span></label>
        <input class="kh-input" formControlName="nombre"
               placeholder="Ej. Sentadillas con salto" />
      </div>

      <div class="kh-form-field">
        <label>Grupo muscular <span class="req">*</span></label>
        <select class="kh-input" formControlName="grupoMuscular">
          <option value="">Seleccionar...</option>
          <option>Piernas</option>
          <option>Pecho</option>
          <option>Espalda</option>
          <option>Core</option>
          <option>Hombros</option>
          <option>Brazos</option>
          <option>Cardio</option>
        </select>
      </div>

      <div class="kh-form-field">
        <label>Duración mínima (minutos) <span class="req">*</span></label>
        <input class="kh-input" type="number" formControlName="duracionMin"
               placeholder="Ej. 30" min="1" />
        <span class="kh-hint">Tiempo estimado de ejecución</span>
      </div>

      <div class="kh-form-field">
        <label>Valor MET <span class="req">*</span></label>
        <input class="kh-input" type="number" step="0.1" formControlName="metValor"
               placeholder="Ej. 5.0" />
        <span class="kh-hint">Equivalente metabólico de la tarea</span>
      </div>

    </div>

    <div class="kh-form-actions">
      <button type="button" class="kh-btn-cancel" routerLink="/ejercicios/listas">
        Cancelar
      </button>
      <button type="submit" class="kh-btn-save" [disabled]="form.invalid">
        Guardar ejercicio
      </button>
    </div>
  </div>
</form>

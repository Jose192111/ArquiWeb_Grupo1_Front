<div class="kh-breadcrumb">App / <a routerLink="/etiquetas/listas">Etiquetas</a> / <span>Nuevo</span></div>

<div class="kh-page-head">
  <div>
    <h2>Nueva Etiqueta</h2>
    <p>Crea una nueva etiqueta para clasificar contenido</p>
  </div>
</div>

<form [formGroup]="form" (ngSubmit)="aceptar()">
  <div class="kh-form-card">
    <div class="kh-form-grid">
      <div class="kh-form-field full">
        <label>Nombre de la etiqueta <span class="req">*</span></label>
        <input class="kh-input" formControlName="nombre" placeholder="Ej. Principiante" />
      </div>

      <div class="kh-form-field full">
        <label>Grupo <span class="req">*</span></label>
        <input class="kh-input" formControlName="grupo" placeholder="Ej. Dificultad" />
      </div>
    </div>

    <div class="kh-form-actions">
      <button type="button" class="kh-btn-cancel" routerLink="/etiquetas/listas">
        Cancelar
      </button>
      <button type="submit" class="kh-btn-save" [disabled]="form.invalid">
        Guardar etiqueta
      </button>
    </div>
  </div>
</form>
